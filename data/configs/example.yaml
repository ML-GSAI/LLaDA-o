t2i_wds:
  dataset_names:
  - t2i_2m
  image_transform_args:
    image_stride: 16
    max_image_size: 1024
    min_image_size: 512
  is_mandatory: true
  num_used_data: # The sum should be larger that NUM_GPUS x NUM_WORKERS
  - None
  weight: 1

vlm_parquet:
  dataset_names:
  - vlm_bee
  image_transform_args:
    image_stride: 14
    max_image_size: 980
    min_image_size: 378
    max_pixels: 2_007_040
  frame_sampler_args:
    max_num_frames: 12
    min_num_frames: 8
  is_mandatory: false
  num_used_data:
  - None
  weight: 1